<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.png" type="image/png" />

    <!-- =========================================
         Viewport & Mobile Optimization
         ========================================= -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1A2A52" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#1A2A52" media="(prefers-color-scheme: light)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Icon Commerce College" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-TileColor" content="#1A2A52" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- =========================================
         SEO Meta Tags
         ========================================= -->
    <meta
      name="description"
      content="Icon Commerce College, Guwahati — empowering Commerce, Arts & Computer Application graduates since 2004. Affiliated to Gauhati University under NEP 2020 (FYUGP). B.Com, BBA, BCA and B.A. programs."
    />
    <meta
      name="keywords"
      content="icon commerce college, commerce college guwahati, bcom guwahati, bba guwahati, bca guwahati, ba guwahati, gauhati university college, fyugp commerce, college code 842"
    />
    <meta name="author" content="Icon Commerce College" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />

    <!-- =========================================
         Open Graph / Facebook
         ========================================= -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://iconcommercecollege.in/" />
    <meta
      property="og:title"
      content="Icon Commerce College, Guwahati | Commerce, Arts & Computer Applications"
    />
    <meta
      property="og:description"
      content="Admissions open at Icon Commerce College, Guwahati. B.Com, BBA, BCA and B.A. programs affiliated to Gauhati University (NEP 2020 / FYUGP). Established 2004."
    />
    <!-- PRODUCTION SWAP: replace og-default.svg with a real 1200×630 raster
         (JPG/PNG) — social platforms don't render SVG share images. See
         docs/images.md. The placeholder keeps the reference resolvable today. -->
    <meta property="og:image" content="%PUBLIC_URL%/images/placeholders/og-default.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Icon Commerce College, Guwahati" />
    <meta property="og:site_name" content="Icon Commerce College" />
    <meta property="og:locale" content="en_IN" />

    <!-- =========================================
         Twitter Card
         ========================================= -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://iconcommercecollege.in/" />
    <meta
      name="twitter:title"
      content="Icon Commerce College, Guwahati"
    />
    <meta
      name="twitter:description"
      content="Commerce, Arts & Computer Application programs affiliated to Gauhati University (NEP 2020 / FYUGP). Established 2004."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/images/placeholders/og-default.svg" />

    <!-- =========================================
         Canonical & Geo
         ========================================= -->
    <link rel="canonical" href="https://iconcommercecollege.in/" />
    <meta name="geo.region" content="IN-AS" />
    <meta name="geo.placename" content="Guwahati" />

    <!-- =========================================
         PWA Manifest & Icons
         ========================================= -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />

    <!-- =========================================
         Preconnect & Fonts (Poppins + Inter)
         ========================================= -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.iconify.design" />
    <!-- Brand logo is served from Cloudinary — warm the connection early. -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap"
      as="style"
      onload="this.onload = null; this.rel = 'stylesheet';"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- =========================================
         Preload the Home hero (LCP) image
         The hero is painted as a CSS background-image, which the browser
         discovers late (after JS renders). Preloading it here, at high
         priority, lets the fetch start during HTML parse so it owns the LCP.
         Points at the real campus photo on Cloudinary (res.cloudinary.com is
         preconnected above). Keep this href + `type` in sync with the
         `hero-campus` override in src/utils/assets.js (see docs/IMAGES.md).
         ========================================= -->
    <link
      rel="preload"
      as="image"
      href="https://res.cloudinary.com/dn9gyaiik/image/upload/v1780835926/Campu_Image_y2ysdx.png"
      type="image/png"
      fetchpriority="high"
    />

    <!-- =========================================
         Page Title
         ========================================= -->
    <title>
      Icon Commerce College, Guwahati | Commerce, Arts & Computer Applications
    </title>

    <!-- =========================================
         Structured Data / JSON-LD (static fallbacks;
         SEOHead injects dynamic versions at runtime)
         ========================================= -->
    <script type="application/ld+json" id="schema-organization">
      {
        "@context": "https://schema.org",
        "@type": "CollegeOrUniversity",
        "name": "Icon Commerce College",
        "alternateName": "ICC",
        "url": "https://iconcommercecollege.in",
        "logo": "https://res.cloudinary.com/dn9gyaiik/image/upload/v1777447286/icon-logo_ssglnp.png",
        "image": "https://iconcommercecollege.in/images/placeholders/og-default.svg",
        "description": "Commerce, Arts & Computer Application college established in 2004, affiliated to Gauhati University (NEP 2020 / FYUGP).",
        "telephone": "+91-9365375782",
        "email": "iconcom.2004@gmail.com",
        "foundingDate": "2004",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Rajgarh Road, Near Byelane No-3, Chandmari",
          "addressLocality": "Guwahati",
          "addressRegion": "Assam",
          "postalCode": "781003",
          "addressCountry": "IN"
        }
      }
    </script>
    <script type="application/ld+json" id="schema-website">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Icon Commerce College",
        "alternateName": "ICC",
        "url": "https://iconcommercecollege.in",
        "inLanguage": "en",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://iconcommercecollege.in/?s={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- =========================================
         Critical CSS (Above the Fold)
         ========================================= -->
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family:
          "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        overflow-x: hidden;
        background-color: #f7f8fb;
        color: #14233d;
        line-height: 1.5;
      }

      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        isolation: isolate;
      }

      /* Skip link for accessibility */
      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: #c8a04d;
        color: #1a2a52;
        padding: 8px 16px;
        z-index: 10000;
        font-weight: 600;
        text-decoration: none;
        border-radius: 0 0 4px 0;
        transition: top 0.2s ease;
      }

      .skip-link:focus {
        top: 0;
      }

      /* Initial Loader — Branded Splash Screen */
      .initial-loader {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }

      .initial-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loader-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        padding: 24px;
        max-width: 320px;
        width: 100%;
      }

      .loader-brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .loader-logo-img {
        width: 220px;
        height: auto;
        object-fit: contain;
        animation: loaderFadeIn 0.6s ease both;
      }

      .loader-tagline {
        margin: 0;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 13px;
        font-weight: 500;
        color: #5b6678;
        letter-spacing: 0.04em;
        text-align: center;
        animation: loaderFadeIn 0.6s 0.2s ease both;
      }

      .loader-bar-track {
        width: 100%;
        height: 3px;
        background: #eceef5;
        border-radius: 3px;
        overflow: hidden;
        animation: loaderFadeIn 0.4s 0.3s ease both;
      }

      .loader-bar-fill {
        height: 100%;
        width: 0%;
        border-radius: 3px;
        background: linear-gradient(90deg, #1a2a52, #2c3e6b, #c8a04d);
        background-size: 200% 100%;
        animation:
          loaderProgress 2s 0.4s ease-in-out forwards,
          loaderShimmer 1.5s 0.4s ease-in-out infinite;
      }

      .loader-status {
        margin: 0;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 12px;
        font-weight: 400;
        color: #90a4ae;
        letter-spacing: 0.02em;
        animation: loaderFadeIn 0.4s 0.4s ease both;
      }

      .loader-dots::after {
        content: "";
        animation: loaderDots 1.4s steps(4, end) infinite;
      }

      @keyframes loaderFadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes loaderProgress {
        0% { width: 0%; }
        30% { width: 40%; }
        60% { width: 70%; }
        100% { width: 92%; }
      }

      @keyframes loaderShimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      @keyframes loaderDots {
        0% { content: ""; }
        25% { content: "."; }
        50% { content: ".."; }
        75% { content: "..."; }
        100% { content: ""; }
      }

      @supports (padding-bottom: env(safe-area-inset-bottom)) {
        body {
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
          padding-bottom: env(safe-area-inset-bottom);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .loader-logo-img,
        .loader-tagline,
        .loader-bar-track,
        .loader-status {
          animation: none;
          opacity: 1;
          transform: none;
        }
        .loader-bar-fill {
          animation: loaderProgress 2s ease-in-out forwards;
        }
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
        html {
          scroll-behavior: auto;
        }
      }

      @media (prefers-color-scheme: dark) {
        .initial-loader { background: #111d3a; }
        .loader-tagline { color: rgba(255, 255, 255, 0.6); }
        .loader-bar-track { background: rgba(255, 255, 255, 0.1); }
        .loader-status { color: rgba(255, 255, 255, 0.4); }
      }

      @media print {
        .initial-loader {
          display: none !important;
        }
      }
    </style>
  </head>
  <body>
    <!-- Noscript fallback -->
    <noscript>
      <div
        style="
          padding: 20px;
          text-align: center;
          background: #1a2a52;
          color: #ffffff;
          font-family: sans-serif;
        "
      >
        <h1 style="color: #c8a04d; margin-bottom: 10px">JavaScript Required</h1>
        <p>You need to enable JavaScript to run this app.</p>
        <p style="margin-top: 10px">
          Please enable JavaScript in your browser settings and refresh the page.
        </p>
      </div>
    </noscript>

    <!-- Initial Loader — Branded Splash Screen -->
    <div
      class="initial-loader"
      id="initial-loader"
      role="progressbar"
      aria-label="Loading Icon Commerce College"
    >
      <div class="loader-wrapper">
        <div class="loader-brand">
          <picture>
            <!-- White lockup if the OS is in dark mode (loader turns navy). -->
            <source
              media="(prefers-color-scheme: dark)"
              srcset="https://res.cloudinary.com/dn9gyaiik/image/upload/v1777456540/icon-logo-white_cgp9nr.png"
            />
            <img
              src="https://res.cloudinary.com/dn9gyaiik/image/upload/v1777447286/icon-logo_ssglnp.png"
              alt="Icon Commerce College"
              class="loader-logo-img"
              width="441"
              height="74"
            />
          </picture>
          <p class="loader-tagline">Where Knowledge Meets Character</p>
        </div>

        <div class="loader-bar-track">
          <div class="loader-bar-fill"></div>
        </div>

        <p class="loader-status">Loading<span class="loader-dots"></span></p>
      </div>
    </div>

    <!-- React Root -->
    <div id="root"></div>

    <!-- Hide initial loader when React is ready -->
    <script>
      (function () {
        if (window.performance && window.performance.mark) {
          window.performance.mark("loader-start");
        }

        window.addEventListener("load", function () {
          setTimeout(function () {
            var loader = document.getElementById("initial-loader");
            if (loader) {
              loader.classList.add("hidden");
              setTimeout(function () {
                if (loader && loader.parentNode) {
                  loader.style.display = "none";
                }
              }, 400);
            }
          }, 200);
        });

        setTimeout(function () {
          var loader = document.getElementById("initial-loader");
          if (loader && !loader.classList.contains("hidden")) {
            loader.classList.add("hidden");
            setTimeout(function () {
              loader.style.display = "none";
            }, 400);
          }
        }, 5000);
      })();
    </script>

    <!-- Register touch events for mobile performance -->
    <script>
      document.addEventListener("touchstart", function () {}, { passive: true });
    </script>
  </body>
</html>
